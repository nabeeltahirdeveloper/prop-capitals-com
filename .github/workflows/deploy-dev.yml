name: Deploy to dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

# Never interrupt an in-flight deploy; queue subsequent runs instead.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  security-scan:
    name: Malicious-code scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for obfuscated / injected code
        run: bash scripts/scan-malicious-code.sh

  build:
    name: Build gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter props-capital-backend build

  lint-and-test:
    name: Lint & test (informational)
    runs-on: ubuntu-latest
    # Reports status but does NOT gate the deploy yet: backend has pre-existing
    # ESLint errors and known failing Jest tests. To make these a hard gate once
    # fixed, add `lint-and-test` to the deploy job's `needs:` list below.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter props-capital-backend db:generate

      - name: Lint backend
        run: pnpm --filter props-capital-backend lint

      - name: Test backend
        run: pnpm --filter props-capital-backend test

  deploy:
    name: Deploy backend to server
    needs: [security-scan, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /var/www/prop-capitals-dev

            git fetch origin dev
            git reset --hard origin/dev

            # Provision pnpm via Corepack (bundled with the server's Node),
            # pinned by the repo's packageManager field.
            export COREPACK_ENABLE_DOWNLOAD_PROMPT=0
            corepack enable pnpm
            pnpm install --frozen-lockfile

            # Defense-in-depth: the obfuscated backdoor has historically been
            # re-injected into the Tailwind configs at install time. Strip any
            # re-introduced payload (restore clean committed configs), then
            # hard-fail the deploy if the scanner still finds a signature
            # anywhere before we build and ship.
            bash scripts/strip-and-scan.sh

            # Prisma: live DB is the source of truth — introspect, then regenerate the client.
            pnpm --filter props-capital-backend db:pull
            pnpm --filter props-capital-backend db:generate

            pnpm --filter props-capital-backend build

            pm2 restart Prop-Capitals-Dev-New
            pm2 save
