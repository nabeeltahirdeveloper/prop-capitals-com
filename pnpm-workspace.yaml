# pnpm 11 reads these settings from here (NOT .npmrc).

packages:
  - props-capital-frontend
  - props-capital-frontend-admin
  - props-capital-backend

# Flat node_modules (npm/yarn-like): hoist every dependency to the workspace-root
# node_modules. Required so Vite (and the server's Prisma/Nest/ts-node) can resolve
# deps like react/react-dom from the repo root. The default "isolated" linker only
# symlinks into each package and leaves the root node_modules empty, which breaks
# Vercel's build (ENOENT node_modules/react/jsx-runtime).
nodeLinker: hoisted

# Run pre/post lifecycle scripts (e.g. backend "prebuild" -> prisma generate).
enablePrePostScripts: true

# Don't fail the install on peer-dependency mismatches (npm/yarn were lenient).
strictPeerDependencies: false

# pnpm blocks dependency build scripts by default. Allow only the ones we need to
# run their install scripts: bcrypt (native addon), esbuild (binary used by Vite),
# prisma engines, and unrs-resolver (native binary for the ESLint import resolver).
allowBuilds:
  bcrypt: true
  esbuild: true
  prisma: true
  '@prisma/client': true
  '@prisma/engines': true
  unrs-resolver: true
